<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Крестики-нолики — умный робот</title>
  <style>
    /* === Базовые стили (как в основном сайте) === */
    :root {
      --bg: #faf9f8;
      --surface: #ffffff;
      --primary: #2b3a67;
      --primary-light: #3f5582;
      --secondary: #496a81;
      --text: #1e1e1e;
      --text-light: #5a5a5a;
      --border: #e4e4e4;
      --shadow: 0 4px 12px rgba(0,0,0,0.12);
      --radius: 16px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      line-height: 1.6;
      padding: 2rem 1rem;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 2.5rem 2rem;
    }

    h1 {
      font-size: 2.2rem;
      font-weight: 500;
      color: var(--primary);
      margin-bottom: 0.25rem;
    }

    /* === Навигация (все ссылки ведут на index.html) === */
    .nav-bar {
      margin-bottom: 2rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      gap: 1.5rem;
      flex-wrap: wrap;
    }

    .nav-bar a {
      font-weight: 500;
      color: var(--primary);
      text-decoration: none;
      border-bottom: 1px solid transparent;
      transition: border-color 0.1s ease;
      background: var(--bg);
      padding: 0.3rem 0.8rem;
      border-radius: 30px;
    }

    .nav-bar a:hover {
      background: var(--primary);
      color: white;
    }

    .nav-bar a.active {
      background: var(--primary);
      color: white;
    }

    /* === Игровая область === */
    .game-container {
      text-align: center;
      margin-top: 2rem;
    }

    .mode-selector {
      margin-bottom: 1.5rem;
      display: flex;
      justify-content: center;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .mode-btn {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 40px;
      padding: 0.5rem 1.5rem;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.1s ease;
      color: var(--text);
    }

    .mode-btn.active {
      background: var(--primary);
      color: white;
      border-color: var(--primary);
    }

    .mode-btn:hover {
      background: var(--primary-light);
      color: white;
      border-color: var(--primary-light);
    }

    .status {
      font-size: 1.2rem;
      margin-bottom: 1.5rem;
      color: var(--primary);
      font-weight: 600;
    }

    .board {
      display: grid;
      grid-template-columns: repeat(3, 100px);
      grid-template-rows: repeat(3, 100px);
      gap: 10px;
      justify-content: center;
      margin: 2rem auto;
    }

    .cell {
      background: var(--bg);
      border: 2px solid var(--border);
      border-radius: var(--radius);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      font-weight: 700;
      color: var(--primary);
      cursor: pointer;
      transition: background 0.1s ease, transform 0.1s ease, box-shadow 0.2s;
    }

    .cell:hover {
      background: var(--surface);
      box-shadow: var(--shadow);
      transform: scale(1.02);
    }

    .cell.taken {
      cursor: not-allowed;
    }

    .cell.taken:hover {
      transform: none;
      box-shadow: none;
      background: var(--bg);
    }

    .reset-btn {
      background: var(--primary);
      color: white;
      border: none;
      padding: 0.6rem 2rem;
      font-size: 1.1rem;
      border-radius: 40px;
      cursor: pointer;
      transition: background 0.15s ease, box-shadow 0.2s;
      margin-top: 1rem;
    }

    .reset-btn:hover {
      background: var(--primary-light);
      box-shadow: var(--shadow);
    }

    footer {
      margin-top: 3rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--border);
      font-size: 0.9rem;
      color: var(--text-light);
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Навигация — все ссылки ведут на единственную страницу конспектов (index.html) -->
    <div class="nav-bar">
      <a href="index.html">🏠 Главная</a>
      <a href="index.html#sem/1">Семестр 1</a>
      <a href="index.html#sem/2">Семестр 2</a>
      <a href="index.html#sem/3">Семестр 3</a>
      <a href="index.html#sem/4">Семестр 4</a>
      <a href="#" class="active">🎮 Игра</a>
    </div>

    <h1>❌ Крестики-нолики ⭕</h1>
    <p style="color: var(--text-light); text-align: center;">Играй с другом или против умного робота</p>

    <div class="game-container">
      <div class="mode-selector">
        <button class="mode-btn active" id="mode2p">👥 Два игрока</button>
        <button class="mode-btn" id="modeVsAI">🤖 Против робота</button>
      </div>

      <div class="status" id="status">Ход: X</div>

      <div class="board" id="board"></div>

      <button class="reset-btn" id="resetBtn">🔄 Новая игра</button>
    </div>

    <footer>
      <a href="index.html" style="color: var(--primary); text-decoration: none;">← Вернуться к конспектам</a>
    </footer>
  </div>

  <script>
    // === Состояние игры ===
    let board = ['', '', '', '', '', '', '', '', ''];
    let currentPlayer = 'X';
    let gameActive = true;
    let vsAI = false; // false = два игрока, true = против компьютера

    // DOM элементы
    const statusEl = document.getElementById('status');
    const boardEl = document.getElementById('board');
    const resetBtn = document.getElementById('resetBtn');
    const mode2pBtn = document.getElementById('mode2p');
    const modeVsAIBtn = document.getElementById('modeVsAI');

    // Победные комбинации
    const winPatterns = [
      [0,1,2], [3,4,5], [6,7,8],
      [0,3,6], [1,4,7], [2,5,8],
      [0,4,8], [2,4,6]
    ];

    // === Отрисовка поля ===
    function renderBoard() {
      boardEl.innerHTML = '';
      board.forEach((value, index) => {
        const cell = document.createElement('div');
        cell.classList.add('cell');
        if (value !== '') cell.classList.add('taken');
        cell.dataset.index = index;
        cell.textContent = value;
        cell.addEventListener('click', handleCellClick);
        boardEl.appendChild(cell);
      });
    }

    // === Обработчик клика по клетке ===
    function handleCellClick(e) {
      const index = e.target.dataset.index;
      if (!gameActive || board[index] !== '') return;

      // Делаем ход игрока
      makeMove(index, currentPlayer);
    }

    // === Выполнение хода ===
    function makeMove(index, player) {
      if (!gameActive || board[index] !== '') return false;

      board[index] = player;
      const cell = boardEl.children[index];
      cell.textContent = player;
      cell.classList.add('taken');

      // Проверка победы
      const winner = checkWinner();
      if (winner) {
        statusEl.textContent = `🏆 Игрок ${winner} победил!`;
        gameActive = false;
        return true;
      }

      // Проверка ничьей
      if (!board.includes('')) {
        statusEl.textContent = `🤝 Ничья!`;
        gameActive = false;
        return true;
      }

      // Смена игрока
      currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
      statusEl.textContent = `Ход: ${currentPlayer}`;

      // Если режим против ИИ и сейчас ход 'O' (робот)
      if (vsAI && currentPlayer === 'O' && gameActive) {
        setTimeout(aiMove, 300); // небольшая задержка для реализма
      }

      return true;
    }

    // === Умный ход компьютера ===
    function aiMove() {
      if (!gameActive || currentPlayer !== 'O') return;

      // 1. Проверить, может ли ИИ выиграть следующим ходом
      for (let i = 0; i < 9; i++) {
        if (board[i] === '') {
          board[i] = 'O';
          if (checkWinner() === 'O') {
            board[i] = ''; // откатываем, потому что makeMove сделает ход заново
            makeMove(i, 'O');
            return;
          }
          board[i] = '';
        }
      }

      // 2. Проверить, может ли игрок выиграть следующим ходом, и заблокировать
      for (let i = 0; i < 9; i++) {
        if (board[i] === '') {
          board[i] = 'X';
          if (checkWinner() === 'X') {
            board[i] = '';
            makeMove(i, 'O');
            return;
          }
          board[i] = '';
        }
      }

      // 3. Занять центр, если свободен
      if (board[4] === '') {
        makeMove(4, 'O');
        return;
      }

      // 4. Занять угол (0,2,6,8) случайно
      const corners = [0, 2, 6, 8];
      const availableCorners = corners.filter(i => board[i] === '');
      if (availableCorners.length > 0) {
        const randomCorner = availableCorners[Math.floor(Math.random() * availableCorners.length)];
        makeMove(randomCorner, 'O');
        return;
      }

      // 5. Любой случайный ход из оставшихся
      const emptyIndices = board.reduce((acc, cell, idx) => {
        if (cell === '') acc.push(idx);
        return acc;
      }, []);
      if (emptyIndices.length > 0) {
        const randomIndex = emptyIndices[Math.floor(Math.random() * emptyIndices.length)];
        makeMove(randomIndex, 'O');
      }
    }

    // === Проверка победителя ===
    function checkWinner() {
      for (let pattern of winPatterns) {
        const [a,b,c] = pattern;
        if (board[a] && board[a] === board[b] && board[a] === board[c]) {
          return board[a];
        }
      }
      return null;
    }

    // === Сброс игры ===
    function resetGame() {
      board = ['', '', '', '', '', '', '', '', ''];
      currentPlayer = 'X';
      gameActive = true;
      statusEl.textContent = 'Ход: X';
      renderBoard();
    }

    // === Переключение режимов ===
    function setMode(mode) {
      vsAI = (mode === 'ai');
      mode2pBtn.classList.toggle('active', !vsAI);
      modeVsAIBtn.classList.toggle('active', vsAI);
      resetGame();
    }

    // === Инициализация и обработчики ===
    renderBoard();
    resetBtn.addEventListener('click', resetGame);

    mode2pBtn.addEventListener('click', () => setMode('2p'));
    modeVsAIBtn.addEventListener('click', () => setMode('ai'));

    // При загрузке устанавливаем режим двух игроков по умолчанию
    setMode('2p');
  </script>
</body>
</html>
